<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00c9a7);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particles span {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(0,255,204,0.6);
      border-radius: 50%;
      animation: float 10s linear infinite;
      bottom: -50px;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 0.7; }
      100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
    }

    .container { max-width: 800px; z-index: 1; }

    h1 { font-size: 3rem; margin-bottom: 10px; }

    p { font-size: 1.2rem; margin-bottom: 20px; opacity: 0.9; }

    .gear {
      font-size: 60px;
      animation: spin 4s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress {
      height: 100%;
      background: #00ffcc;
      animation: load 4s infinite alternate;
    }

    @keyframes load {
      0% { width: 15%; }
      100% { width: 75%; }
    }

    .countdown {
      font-size: 1.5rem;
      margin-top: 10px;
      letter-spacing: 2px;
    }

    .wave {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100px;
      background: rgba(255,255,255,0.05);
      animation: wave 8s linear infinite;
    }

    @keyframes wave {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      p { font-size: 1rem; }
      .countdown { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="particles">
    <span style="left:10%; animation-delay:0s"></span>
    <span style="left:20%; animation-delay:2s"></span>
    <span style="left:30%; animation-delay:4s"></span>
    <span style="left:40%; animation-delay:1s"></span>
    <span style="left:50%; animation-delay:3s"></span>
    <span style="left:60%; animation-delay:5s"></span>
    <span style="left:70%; animation-delay:2s"></span>
    <span style="left:80%; animation-delay:4s"></span>
    <span style="left:90%; animation-delay:1s"></span>
  </div>

  <div class="wave"></div>

  <div class="container">
    <div class="gear">⚙️</div>
    <h1>We're Building Something Awesome</h1>
    <p>Our website is under construction. We'll be here soon.</p>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

    <div class="countdown">Launching Soon...</div>
  </div>

</body>
</html>
