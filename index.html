<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Construction</title>
    <style>
        /* Base Reset & Variables */
        :root {
            --bg-color: #22252a;
            --text-main: #f5f6fa;
            --text-muted: #7f8fa6;
            --yellow: #fbc531;
            --orange: #e1b12c;
            --dark: #192a56;
        }

        body, html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Hazard Tape Borders */
        .hazard-tape {
            height: 15px;
            width: 100%;
            background: repeating-linear-gradient(
                45deg,
                var(--yellow),
                var(--yellow) 20px,
                #000 20px,
                #000 40px
            );
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Typography */
        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--yellow);
            margin: 0.5rem 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            max-width: 400px;
            background-color: #353b48;
            border-radius: 20px;
            padding: 4px;
            margin-bottom: 1rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .progress-bar {
            height: 20px;
            width: 65%; /* Adjust this percentage to show progress */
            background-color: var(--yellow);
            border-radius: 15px;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.15) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.15) 50%,
                rgba(255, 255, 255, 0.15) 75%,
                transparent 75%,
                transparent
            );
            background-size: 40px 40px;
            animation: moveStripes 2s linear infinite;
        }

        /* SVG Crane Animations */
        .crane-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: -20px; /* Brings it closer to the text */
        }

        .hook-group {
            animation: lift 4s infinite alternate ease-in-out;
        }

        .warning-light {
            animation: blink 1s infinite alternate;
        }

        @keyframes lift {
            0% { transform: translateY(20px); }
            100% { transform: translateY(-40px); }
        }

        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 40px 0; }
        }

        @keyframes blink {
            0%, 20% { opacity: 0.2; fill: #c0392b; }
            80%, 100% { opacity: 1; fill: #ff4757; }
        }

    </style>
</head>
<body>

    <div class="hazard-tape"></div>

    <div class="container">
        <!-- SVG Animated Crane -->
        <div class="crane-container">
            <svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Background Building Silhouettes -->
                <rect x="20" y="120" width="60" height="130" fill="#2f3640" />
                <rect x="230" y="150" width="50" height="100" fill="#2f3640" />
                
                <!-- The Load & Hook (Animated) -->
                <g class="hook-group">
                    <!-- Cable sliding behind jib -->
                    <rect x="189" y="0" width="2" height="150" fill="#7f8fa6" />
                    <!-- Hook Block -->
                    <rect x="180" y="150" width="20" height="10" fill="#353b48" rx="2"/>
                    <!-- Hook -->
                    <path d="M190 160 c 0 10, -8 10, -8 18 c 0 5, 5 5, 5 5" fill="none" stroke="#353b48" stroke-width="4" stroke-linecap="round"/>
                    <!-- Steel Beam (Load) -->
                    <rect x="140" y="185" width="100" height="20" fill="#e1b12c" rx="2"/>
                    <circle cx="150" cy="195" r="3" fill="#2f3640" />
                    <circle cx="230" cy="195" r="3" fill="#2f3640" />
                    <!-- Lifting Ropes -->
                    <line x1="190" y1="170" x2="150" y2="185" stroke="#353b48" stroke-width="2" />
                    <line x1="190" y1="170" x2="230" y2="185" stroke="#353b48" stroke-width="2" />
                    <!-- Load Text -->
                    <text x="190" y="199" fill="#22252a" font-size="12" font-family="Arial" font-weight="bold" text-anchor="middle">SITE</text>
                </g>

                <!-- Crane Mast -->
                <rect x="100" y="70" width="25" height="180" fill="#fbc531" />
                <!-- Mast Bracing -->
                <path d="M100 90 L125 110 M100 110 L125 130 M100 130 L125 150 M100 150 L125 170 M100 170 L125 190 M100 190 L125 210 M100 210 L125 230 M100 230 L125 250" stroke="#c23616" stroke-width="2" fill="none" />
                
                <!-- Crane Jib (Horizontal Arm) -->
                <rect x="40" y="50" width="240" height="20" fill="#fbc531" />
                <!-- Jib Bracing -->
                <path d="M40 70 L60 50 M60 70 L80 50 M80 70 L100 50 M125 70 L145 50 M145 70 L165 50 M165 70 L185 50 M185 70 L205 50 M205 70 L225 50 M225 70 L245 50 M245 70 L265 50 M265 70 L280 50" stroke="#c23616" stroke-width="2" fill="none" />
                
                <!-- Crane Top / Peak -->
                <polygon points="112.5,10 100,50 125,50" fill="#fbc531" />
                
                <!-- Support Cables -->
                <line x1="112.5" y1="10" x2="40" y2="50" stroke="#7f8fa6" stroke-width="2" />
                <line x1="112.5" y1="10" x2="220" y2="50" stroke="#7f8fa6" stroke-width="2" />
                <line x1="112.5" y1="20" x2="270" y2="50" stroke="#7f8fa6" stroke-width="2" />

                <!-- Counterweight -->
                <rect x="40" y="70" width="30" height="25" fill="#718093" />
                
                <!-- Trolley (Moves along the jib) -->
                <rect x="175" y="65" width="30" height="10" fill="#353b48" rx="2" />

                <!-- Flashing Warning Light -->
                <circle cx="112.5" cy="5" r="5" class="warning-light" />
                
                <!-- Safety Cone 1 -->
                <g transform="translate(130, 230)">
                    <polygon points="10,20 15,0 20,20" fill="#e1b12c" />
                    <rect x="13" y="5" width="4" height="4" fill="#fff" />
                    <rect x="8" y="18" width="14" height="2" fill="#e1b12c" />
                </g>
                <!-- Safety Cone 2 -->
                <g transform="translate(80, 230)">
                    <polygon points="10,20 15,0 20,20" fill="#e1b12c" />
                    <rect x="13" y="5" width="4" height="4" fill="#fff" />
                    <rect x="8" y="18" width="14" height="2" fill="#e1b12c" />
                </g>
            </svg>
        </div>

        <h1>Under Construction</h1>
        <p>Pardon our dust! We are laying the foundation for an incredible new website. Heavy machinery is currently operating behind the scenes. Check back soon!</p>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <div class="hazard-tape"></div>

</body>
</html>
